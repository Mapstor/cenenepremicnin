<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <!-- Emerald green background (iOS will apply rounded corners) -->
  <rect width="180" height="180" fill="#059669"/>

  <!-- White map icon (scaled up) -->
  <g transform="translate(30, 30)" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Map outline with folds -->
    <polygon points="6 36 6 114 42 96 78 114 114 96 114 18 78 36 42 18 6 36"/>
    <!-- Vertical fold lines -->
    <line x1="42" y1="18" x2="42" y2="96"/>
    <line x1="78" y1="36" x2="78" y2="114"/>
  </g>
</svg>
