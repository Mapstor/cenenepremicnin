<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Emerald green rounded background (bg-emerald-600 = #059669) -->
  <rect width="32" height="32" rx="6" fill="#059669"/>

  <!-- White map icon (simplified Lucide Map) -->
  <g transform="translate(6, 6)" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Map outline with folds -->
    <polygon points="1 6 1 19 7 16 13 19 19 16 19 3 13 6 7 3 1 6"/>
    <!-- Vertical fold lines -->
    <line x1="7" y1="3" x2="7" y2="16"/>
    <line x1="13" y1="6" x2="13" y2="19"/>
  </g>
</svg>
